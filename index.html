<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>СПОКОЙНО — Дизайн</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow-x:auto;padding:40px 20px}
    .board{display:flex;gap:20px;align-items:flex-start}
    .screen{border-radius:20px;overflow:hidden;box-shadow:0 4px 30px rgba(0,0,0,.5);border:2px solid #222}
    .screen img{display:block;height:auto}
    .screen--mobile{width:320px}
    .screen--desktop{width:800px}
    @media(max-width:768px){
      .board{flex-direction:column;align-items:center}
      .screen--mobile{width:280px}
      .screen--desktop{width:95vw}
    }
  </style>
</head>
<body>
  <div class="board">
    <!-- Mobile screens -->
    <div class="screen screen--mobile"><img src="images/screen_1.png" alt=""></div>
    <div class="screen screen--mobile"><img src="images/screen_2.png" alt=""></div>
    <div class="screen screen--mobile"><img src="images/screen_3.png" alt=""></div>
    <div class="screen screen--mobile"><img src="images/screen_4.png" alt=""></div>
    <div class="screen screen--mobile"><img src="images/screen_5.png" alt=""></div>
    <!-- Desktop screens -->
    <div class="screen screen--desktop"><img src="images/screen_6.png" alt=""></div>
    <div class="screen screen--desktop"><img src="images/screen_7.png" alt=""></div>
    <div class="screen screen--desktop"><img src="images/screen_8.png" alt=""></div>
    <div class="screen screen--desktop"><img src="images/screen_9.png" alt=""></div>
  </div>
</body>
</html>
