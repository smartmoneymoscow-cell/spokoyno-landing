<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>СПОКОЙНО</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#fff}
    .screen{display:block;width:100%;height:auto}
    .screens{display:flex;flex-direction:column}
    .desktop-only{display:none}
    .mobile-only{display:block}
    @media(min-width:769px){
      .mobile-only{display:none}
      .desktop-only{display:block}
      .screens{flex-direction:row;flex-wrap:wrap;justify-content:center}
      .screen{width:auto;height:100vh;margin:0 8px}
    }
  </style>
</head>
<body>
  <div class="screens">
    <div class="mobile-only">
      <img class="screen" src="screens/s2_landing.png" alt="">
      <img class="screen" src="screens/s3_order1.png" alt="">
      <img class="screen" src="screens/s4_order2.png" alt="">
      <img class="screen" src="screens/s5_order3.png" alt="">
    </div>
    <div class="desktop-only">
      <img class="screen" src="screens/d1_desktop1.png" alt="">
      <img class="screen" src="screens/d2_desktop2.png" alt="">
      <img class="screen" src="screens/d3_desktop3.png" alt="">
      <img class="screen" src="screens/d4_desktop4.png" alt="">
    </div>
  </div>
</body>
</html>
