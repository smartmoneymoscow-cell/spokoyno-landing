<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0faf7"/>
      <stop offset="100%" style="stop-color:#d1f5ea"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bgp)"/>
  <!-- Family group - 3 generations -->
  <!-- Grandmother -->
  <circle cx="250" cy="200" r="45" fill="#c0c0c0"/>
  <circle cx="250" cy="210" r="38" fill="#f5d0a9"/>
  <rect x="210" y="260" width="80" height="130" rx="16" fill="#8B6914"/>
  <!-- Mother -->
  <circle cx="400" cy="190" r="42" fill="#8B6914"/>
  <circle cx="400" cy="200" r="35" fill="#f5d0a9"/>
  <rect x="362" y="250" width="76" height="130" rx="16" fill="#2DD4A8"/>
  <!-- Father -->
  <circle cx="550" cy="195" r="48" fill="#4a3a2a"/>
  <circle cx="550" cy="205" r="40" fill="#f0c090"/>
  <rect x="505" y="255" width="90" height="140" rx="16" fill="#3a5a8a"/>
  <!-- Connecting hands -->
  <line x1="290" y1="300" x2="362" y2="300" stroke="#f5d0a9" stroke-width="8" stroke-linecap="round"/>
  <line x1="438" y1="300" x2="505" y2="300" stroke="#f5d0a9" stroke-width="8" stroke-linecap="round"/>
  <!-- Heart -->
  <path d="M400 120 L390 105 Q380 90 390 85 Q400 80 400 90 Q400 80 410 85 Q420 90 410 105 Z" fill="#ff6b6b" opacity="0.6"/>
  <text x="400" y="550" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#6B7280" opacity="0.6">Фото: счастливая семья</text>
</svg>
