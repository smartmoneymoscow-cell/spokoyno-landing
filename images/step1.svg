<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0faf7"/>
      <stop offset="100%" style="stop-color:#e0f5ed"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg1)"/>
  <!-- Laptop -->
  <rect x="150" y="120" width="300" height="200" rx="12" fill="#2a2a2a"/>
  <rect x="160" y="130" width="280" height="175" rx="4" fill="#4a9eff"/>
  <!-- Screen content -->
  <rect x="180" y="150" width="120" height="12" rx="3" fill="rgba(255,255,255,0.8)"/>
  <rect x="180" y="170" width="200" height="8" rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="180" y="185" width="180" height="8" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="180" y="210" width="100" height="35" rx="8" fill="#2DD4A8"/>
  <text x="230" y="233" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="white" font-weight="600">ЗАКАЗАТЬ</text>
  <!-- Laptop base -->
  <rect x="120" y="320" width="360" height="15" rx="4" fill="#3a3a3a"/>
  <!-- Hand pointing -->
  <circle cx="420" cy="250" r="25" fill="#f5d0a9"/>
  <rect x="410" y="210" width="20" height="45" rx="10" fill="#f5d0a9"/>
  <!-- Phone nearby -->
  <rect x="480" y="200" width="60" height="110" rx="10" fill="#1a1a1a"/>
  <rect x="485" y="210" width="50" height="85" rx="4" fill="#2DD4A8"/>
  <text x="400" y="370" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#6B7280" opacity="0.6">Оформление заказа</text>
</svg>
