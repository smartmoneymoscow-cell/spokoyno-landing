<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0faf7"/>
      <stop offset="100%" style="stop-color:#d1f5ea"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d0a9"/>
      <stop offset="100%" style="stop-color:#e8b88a"/>
    </linearGradient>
    <linearGradient id="hair" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c0c0"/>
      <stop offset="100%" style="stop-color:#a0a0a0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Kitchen background elements -->
  <rect x="0" y="350" width="800" height="250" fill="#f5f0e8" opacity="0.5"/>
  <rect x="50" y="100" width="200" height="300" rx="8" fill="#e8e3d8" opacity="0.3"/>
  <!-- Counter -->
  <rect x="0" y="420" width="800" height="180" fill="#e8ddd0" rx="0"/>
  <rect x="0" y="420" width="800" height="8" fill="#d4c9ba"/>
  <!-- Cup -->
  <ellipse cx="450" cy="390" rx="30" ry="10" fill="#fff"/>
  <rect x="420" y="340" width="60" height="50" rx="4" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <ellipse cx="480" cy="365" rx="15" ry="8" fill="none" stroke="#e0e0e0" stroke-width="2"/>
  <!-- Steam -->
  <path d="M440 330 Q445 310 440 290" fill="none" stroke="#d0d0d0" stroke-width="2" opacity="0.5"/>
  <path d="M450 325 Q455 305 450 285" fill="none" stroke="#d0d0d0" stroke-width="2" opacity="0.4"/>
  <!-- Elderly woman figure -->
  <circle cx="320" cy="200" r="55" fill="url(#hair)"/>
  <circle cx="320" cy="210" r="45" fill="url(#skin)"/>
  <rect x="270" y="270" width="100" height="150" rx="20" fill="#7c6aad"/>
  <rect x="260" y="280" width="120" height="40" rx="20" fill="url(#skin)"/>
  <!-- Smile -->
  <path d="M305 225 Q320 240 335 225" fill="none" stroke="#c49a7c" stroke-width="2" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="308" cy="205" r="3" fill="#5a4a3a"/>
  <circle cx="332" cy="205" r="3" fill="#5a4a3a"/>
  <!-- Glasses -->
  <circle cx="308" cy="205" r="12" fill="none" stroke="#888" stroke-width="1.5"/>
  <circle cx="332" cy="205" r="12" fill="none" stroke="#888" stroke-width="1.5"/>
  <line x1="320" y1="205" x2="320" y2="205" stroke="#888" stroke-width="1.5"/>
  <!-- Young woman figure -->
  <circle cx="480" cy="190" r="50" fill="#8B6914"/>
  <circle cx="480" cy="200" r="40" fill="url(#skin)"/>
  <rect x="435" y="260" width="90" height="140" rx="18" fill="#2DD4A8"/>
  <rect x="425" y="270" width="110" height="35" rx="18" fill="url(#skin)"/>
  <!-- Smile -->
  <path d="M468 215 Q480 228 492 215" fill="none" stroke="#c49a7c" stroke-width="2" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="470" cy="200" r="3" fill="#5a4a3a"/>
  <circle cx="490" cy="200" r="3" fill="#5a4a3a"/>
  <!-- Decorative plant -->
  <rect x="620" y="350" width="40" height="60" rx="6" fill="#c9a96e"/>
  <circle cx="640" cy="330" r="30" fill="#6abf8a"/>
  <circle cx="625" cy="320" r="20" fill="#5aae7a"/>
  <circle cx="655" cy="315" r="22" fill="#7acf9a"/>
  <!-- Text overlay -->
  <text x="400" y="550" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#6B7280" opacity="0.6">Фото: бабушка с внучкой на кухне</text>
</svg>
