<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#e8e0f5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bgt)"/>
  <!-- Elderly couple -->
  <!-- Person 1 (woman) -->
  <circle cx="300" cy="220" r="50" fill="#c0c0c0"/>
  <circle cx="300" cy="230" r="42" fill="#f5d0a9"/>
  <rect x="255" y="285" width="90" height="140" rx="18" fill="#c06a8a"/>
  <!-- Person 2 (man) -->
  <circle cx="450" cy="210" r="55" fill="#808080"/>
  <circle cx="450" cy="220" r="45" fill="#e8c090"/>
  <rect x="400" y="275" width="100" height="150" rx="18" fill="#4a6a8a"/>
  <!-- Tablet between them -->
  <rect x="320" y="290" width="130" height="90" rx="8" fill="#1a1a1a"/>
  <rect x="325" y="295" width="120" height="75" rx="4" fill="white"/>
  <!-- Screen content -->
  <rect x="335" y="305" width="80" height="8" rx="2" fill="#2DD4A8"/>
  <rect x="335" y="320" width="100" height="5" rx="2" fill="#e0e0e0"/>
  <rect x="335" y="330" width="90" height="5" rx="2" fill="#e0e0e0"/>
  <rect x="335" y="345" width="60" height="18" rx="4" fill="#2DD4A8" opacity="0.3"/>
  <!-- Arms holding tablet -->
  <rect x="290" y="280" width="40" height="20" rx="10" fill="#f5d0a9" transform="rotate(-15 310 290)"/>
  <rect x="440" y="275" width="40" height="20" rx="10" fill="#e8c090" transform="rotate(15 460 285)"/>
  <!-- Smiles -->
  <path d="M288 245 Q300 258 312 245" fill="none" stroke="#c49a7c" stroke-width="2" stroke-linecap="round"/>
  <path d="M438 235 Q450 248 462 235" fill="none" stroke="#c49a7c" stroke-width="2" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="290" cy="225" r="3" fill="#5a4a3a"/>
  <circle cx="310" cy="225" r="3" fill="#5a4a3a"/>
  <circle cx="438" cy="215" r="3" fill="#5a4a3a"/>
  <circle cx="462" cy="215" r="3" fill="#5a4a3a"/>
  <!-- Table -->
  <rect x="200" y="380" width="400" height="15" rx="4" fill="#d4c9ba"/>
  <rect x="230" y="395" width="8" height="100" fill="#c4b9a8"/>
  <rect x="562" y="395" width="8" height="100" fill="#c4b9a8"/>
  <!-- Warm light glow -->
  <circle cx="375" cy="250" r="120" fill="#fff5e0" opacity="0.15"/>
  <text x="400" y="560" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#6B7280" opacity="0.6">Фото: пожилая пара с планшетом</text>
</svg>
